name: Zylo Full CI Pipeline

on:
  push:
  pull_request:

jobs:

# =========================
# CLIENT (Next.js)
# =========================
  client:
    name: Client Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js App
        run: npm run build


# =========================
# SERVER (Express + TS)
# =========================
  server:
    name: Server Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Server (TypeScript)
        run: npm run build


# =========================
# DOCKER BUILD & PUSH
# =========================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [client, server]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Client Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/zylo-client ./client

      - name: Build Server Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/zylo-server ./server

      - name: Push Client Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/zylo-client

      - name: Push Server Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/zylo-server


  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [docker]

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/zylo-client:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/zylo-server:latest

            docker stop zylo-client || true
            docker rm zylo-client || true
            docker stop zylo-server || true
            docker rm zylo-server || true

            docker run -d -p 3000:3000 --name zylo-client ${{ secrets.DOCKER_USERNAME }}/zylo-client:latest
            docker run -d -p 5000:5000 --name zylo-server ${{ secrets.DOCKER_USERNAME }}/zylo-server:latest